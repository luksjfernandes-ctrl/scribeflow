# Scribeflow Workflow Add New Feature With Ui Modal Or Tab

## Action

Follow the add-new-feature-with-ui-modal-or-tab workflow:
1. Create a new component file for the modal or tab (e.g., StatisticsModal.tsx, TargetsModal.tsx).
2. Update App.tsx to include state and handlers for the new modal/tab and render it conditionally.
3. Wire up UI triggers (buttons, toolbar, etc.) to open the modal/tab.
4. If necessary, update related CSS or shared logic.
5. Test integration with existing data models (no schema change needed).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/App.tsx, src/components/*Modal.tsx, src/components/Inspector.tsx

